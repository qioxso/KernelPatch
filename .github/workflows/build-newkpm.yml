name: Build newkpm

on:
  workflow_dispatch:

jobs:
  build-newkpm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TOOLCHAIN_PREFIX: ${{ github.workspace }}/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Compiler
        shell: bash
        run: |
          set -euxo pipefail
          curl -L -o arm-gnu-toolchain.tar.xz \
            https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -Jxf arm-gnu-toolchain.tar.xz
          "${TOOLCHAIN_PREFIX}gcc" --version
          "${TOOLCHAIN_PREFIX}ld" --version
          "${TOOLCHAIN_PREFIX}readelf" --version

      - name: Resolve Module Directory
        shell: bash
        run: |
          set -euxo pipefail
          ls -la
          ls -la kpms || true
          if [ -d kpms/newkpm ]; then
            echo "KPM_DIR=kpms/newkpm" >> "$GITHUB_ENV"
          elif [ -d kpms/new ]; then
            echo "KPM_DIR=kpms/new" >> "$GITHUB_ENV"
          else
            echo "Unable to find module directory. Expected kpms/newkpm or kpms/new."
            find kpms -maxdepth 2 -mindepth 1 -print || true
            exit 1
          fi
          test -f "${KPM_DIR:-kpms/newkpm}/Makefile" || test -f "${KPM_DIR:-kpms/new}/Makefile"
          test -f "${KPM_DIR:-kpms/newkpm}/amem_kpm.c" || test -f "${KPM_DIR:-kpms/new}/amem_kpm.c"
          test -f kernel/include/compiler.h

      - name: Build amem_kpm.kpm
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci_artifacts/newkpm
          make -C "${KPM_DIR}" \
            TARGET_COMPILE="${TOOLCHAIN_PREFIX}" \
            KP_DIR="${GITHUB_WORKSPACE}" \
            clean
          make -C "${KPM_DIR}" \
            TARGET_COMPILE="${TOOLCHAIN_PREFIX}" \
            KP_DIR="${GITHUB_WORKSPACE}" \
            print-vars | tee "${KPM_DIR}/print-vars.txt"
          make -C "${KPM_DIR}" \
            TARGET_COMPILE="${TOOLCHAIN_PREFIX}" \
            KP_DIR="${GITHUB_WORKSPACE}" \
            2>&1 | tee "${KPM_DIR}/build.log"

      - name: Check Relocations
        shell: bash
        run: |
          set -euxo pipefail
          make -C "${KPM_DIR}" \
            TARGET_COMPILE="${TOOLCHAIN_PREFIX}" \
            KP_DIR="${GITHUB_WORKSPACE}" \
            check-relocs 2>&1 | tee "${KPM_DIR}/readelf-relocs.txt"
          if grep -E 'R_AARCH64_ADR_GOT_PAGE|R_AARCH64_LD64_GOT_LO12_NC' "${KPM_DIR}/readelf-relocs.txt"; then
            echo "Unsupported GOT relocations detected in amem_kpm.kpm"
            exit 1
          fi

      - name: Inspect Binary
        shell: bash
        run: |
          set -euxo pipefail
          file "${KPM_DIR}/amem_kpm.kpm" | tee "${KPM_DIR}/file.txt"
          "${TOOLCHAIN_PREFIX}nm" -u "${KPM_DIR}/amem_kpm.kpm" | tee "${KPM_DIR}/nm-undefined.txt" || true
          cp -f "${KPM_DIR}/amem_kpm.kpm" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/amem_kpm.o" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/print-vars.txt" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/build.log" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/readelf-relocs.txt" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/file.txt" ci_artifacts/newkpm/
          cp -f "${KPM_DIR}/nm-undefined.txt" ci_artifacts/newkpm/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: newkpm-build
          path: ci_artifacts/newkpm
